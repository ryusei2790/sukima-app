# CI ワークフロー
# 役割: push または PR 時に Lint・型チェック・ビルド確認を自動実行する
# トリガー: すべてのブランチへの push、および main ブランチへの PR

name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: Lint / Type Check / Build
    runs-on: ubuntu-latest

    steps:
      # リポジトリのコードをチェックアウト
      - name: Checkout
        uses: actions/checkout@v4

      # Node.js のセットアップ（package-lock.json に合わせて v20 を使用）
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 依存パッケージのインストール（ci は lockfile を厳密に使うため本番向き）
      - name: Install dependencies
        run: npm ci

      # ESLint によるコードスタイルチェック
      - name: Lint
        run: npm run lint

      # Prisma クライアントの生成（src/generated/ は .gitignore 対象のため CI で必須）
      # DATABASE_URL はDB接続には使われず prisma.config.ts の変数解決のためのダミー値
      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      # TypeScript の型エラーチェック（コンパイルはせずエラー検出のみ）
      - name: Type check
        run: npx tsc --noEmit

      # Next.js の本番ビルドが通るか確認
      - name: Build
        run: npm run build
