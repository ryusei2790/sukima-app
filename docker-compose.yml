services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # ソースコードをマウント（コンテナ外の編集がリアルタイムに反映される）
      - .:/app
      # node_modules はコンテナ内のものを使う（ホストのものと混在させない）
      - /app/node_modules
    environment:
      - NODE_ENV=development
      # Next.js のホットリロードを Docker 内で動かすための設定
      - WATCHPACK_POLLING=true
